		function setWfh(obj) {
			obj.callerInfo = {};
			obj.callerInfo.pid = myCefRenderProcessId;
			obj.callerInfo.bid = myCefBrowserId;
			obj.callerInfo.fid = myCefFrameId;
			let retValue;
			retValue = myCefExtension.doEldosCallShell("https://127.0.0.1:51666/ztcallshell/do",JSON.stringify(obj));
			return JSON.parse(retValue);
		}
		function shzsConsole(str) {
			var formData = {
				"func": "sendMsg",
				"reqContent": {
					"msgkind": "HINT",
					"msg": str
				}
			}
			setWfh(formData);
		}
		/*
 *     利用Shell存储全局变量
 */
zdwpSetVarValue = function (varName, varValue) {
    var formData = {
        "func": "varStore",
        "reqContent": {
            "name": varName,
            "opType": "write",
            "value": varValue
        }
    }
    setWfh(formData);
};
/*
 *     从Shell读取全局变量
 */
 zdwpGetVarValue = function (varName) {
    var formData = {
        "func": "varStore",
        "reqContent": {
            "name": varName,
            "opType": "read",
            "value": ""
        }
    }
    return setWfh(formData).repContent.value;
};

		/*传输json的post请求*/
		function jsonPost(url, data, callback) {
			$.ajax({
				type: "POST",
				contentType: "application/json; charset=utf-8",
				url: url,
				data: JSON.stringify(data),
				success: function (res) {
					if (res.code == "401") {
						window.alert("未登录");
					} else if (res.code == "0" || res.code == "3001") {
						callback(res);
					} else {
						window.alert(res.msg);
					}

				}

			})
		}
		String.prototype.substr = function (a, b) {
			var pos, length;
			if (a < 0) {
				pos = this.length - 0 + a;
			} else {
				pos = a;
			}
			if (b) {
				length = pos + b;
			} else {
				length = this.length;
			}
			return this.substring(pos, length);
		}
		function getHost() {
			var url = window.location.href;
			var path = window.location.pathname;
			var pos = url.indexOf(path);
			return url.substring(0, pos);
		}
		function getPageNo(pgButton, tableName) {
			var pageno = $('#' + tableName + 'Pager_center > table > tbody > tr > td:nth-child(7) > input').val();
			if (pgButton == 'next') { //点击下一页
				pageno = parseInt(pageno) + 1;
			} else if (pgButton == 'prev') { //点击上一页
				pageno = parseInt(pageno) - 1;
			} else if (pgButton == 'user') { //自主输入页号
				var s = ($("span#sp_1_" + tableName + "Pager").text());
				var lastPageno = s.split(',').join('').replace(/[\t|\s]/g, '');
				lastPageno = parseFloat(lastPageno) || 0;
				pageno = parseFloat(pageno) || 0;
				if (pageno < 1 || pageno > lastPageno) pageno = 1;
				pageno = pageno;
			} else if (pgButton == 'last') { //  最后一页
				var s = ($("span#sp_1_" + tableName + "Pager").text());
				pageno = s.split(',').join('').replace(/[\t|\s]/g, '');
			} else if (pgButton == 'first') { //首页
				pageno = 1;
			} else if (pgButton == 'records') { //改变每页显示行数，pageno 变为1
				pageno = 1;
			}
			return pageno;
		}

		function checkDate(startTime, endTime) {
			var valid = true;
			var validDateStart = startTime;
			var validDateEnd = endTime;
			if (validDateStart.length > 0 && validDateEnd.length > 0) {
				var startDateTemp = validDateStart.substring(0, 10);
				var endDateTemp = validDateEnd.substring(0, 10);
				var time1 = new Date(startDateTemp.replace(/\-/g, "\/"));
				var time2 = new Date(endDateTemp.replace(/\-/g, "\/"));
				if (time1 > time2) {
					valid = false;
					return valid;
				}
			}
			return valid
		}

			initWpdx: function () {
				$('.content-body .list').remove();
				zdwp.data.wpdxList.forEach(function (item, index) {

					// 创建新的.list元素  
					var list = $('<div>').addClass('list');
					if (!item.checked) {
						list.addClass('ligangcolor')
					}
					// 插入checkbox  
					var checkBox = $('<span>').addClass('checkBox');
					var checkBoxInput = $('<input>').attr('type', 'checkbox').attr('id', item.sfdm).on('change', function () {
						var checked = $(this).is(':checked');
						var currentId = $(this).attr('id');
						zdwp.data.wpdxList.forEach(function (item) {
							if (item.sfdm === currentId) {
								item.checked = checked;
								item.sfwp = checked;
								var params = {
									sfdm: item.sfdm,
									status: checked ? 1 : 0
								}
								jsonPost("/shzs/dbwt/dbswry/update", params, function (res) {
									if (res.code == '0') {
										zdwp.initWpdxList()
									}
								})
							}
						});
					})
					if (item.checked) {
						checkBoxInput.prop('checked', true);
					}
					checkBox.append(checkBoxInput);
					list.append(checkBox);

					// 插入人员姓名  
					var swry = $('<span>').addClass('swry').text(item.swry);
					list.append(swry);

					// 插入是否委派的信息  
					var sfwp = $('<span>').addClass('sfwp');
					if (item.sfwp === true) {
						sfwp.addClass('ct').text('在岗');
					} else {
						sfwp.text('离岗');
					}
					list.append(sfwp);
					// 将创建好的.list元素添加到.content-body中  
					$('.content-body').append(list);

				});
			},

			setWpdx: function () {
				var wpMxs = []
				var rowids = $("#zdwp_table").jqGrid("getGridParam", "selarrrow");
				if (rowids.length <= 0) {
					alert("请至少选择一条记录!");
					return;
				}
				rowids.forEach(item => {
					var row = $("#zdwp_table").jqGrid("getRowData", item)
					var obj = {}
					obj.gzxid = row.gzxid
					obj.nsrsbh = row.nsrsbh
					obj.lcswsxDm = row.lcswsxDm
					obj.nsrmc = row.nsrmc
					obj.lcslid = row.lcslid
					obj.rwfqsj = row.rwfqsj
					wpMxs.push(obj)
				})
				var params = {
					wpMxs
				}
				jsonPost("/shzs/dbwt/dbswry/submit", params, function (res) {
					if (res.code == '0') {
						res.data.forEach(ele => {
							$('#zdwp_table').setCell(ele.gzxid, 'wpjg', ele.errorMsg);
							$('#zdwp_table').setCell(ele.gzxid, 'wpdx', ele.wpdx);
							$('#zdwp_table').setCell(ele.gzxid, 'wpdxqyfz', ele.wpdxqyfz);
							$('#zdwp_table').setCell(ele.gzxid, 'userId', ele.swrydm);
							$('#zdwp_table').setCell(ele.gzxid, 'swrysfDm', ele.wpsfdm);
							$('#zdwp_table').setCell(ele.gzxid, 'swjgDm', ele.sfswjgdm);
							$('#zdwp_table').setCell(ele.gzxid, 'gwDm', ele.gwdm);
							$('#zdwp_table').setCell(ele.gzxid, 'sourceUser', ele.xndbrdm);
							if (ele.errorMsg) {
								$('#zdwp_table').setCell(ele.gzxid, 'wpjg', ele.errorMsg);
							} else if (!ele.wpdx) {
								$('#zdwp_table').setCell(ele.gzxid, 'wpjg', '无委派对象');
							}
						})
						alert('处理完成')
					}
				})

			//点击提交委派
			commit: function () {
				zdwp.data.rowids = []
				var wpMxs = []
				var arr = []
				var rowids = $("#zdwp_table").jqGrid("getGridParam", "selarrrow");
				if (rowids.length <= 0) {
					alert("请至少选择一条记录!");
					return;
				}
				var isWp = true
				var isJg = true
				rowids.forEach(item => {
					var row = $("#zdwp_table").jqGrid("getRowData", item)
					var wpdx = row.wpdx
					var wpjg = row.wpjg
					if (wpdx == '') {
						isWp = false
					}
					if (wpjg == '委派成功') {
						isJg = false
					}
					if(wpdx != ''&& wpjg != '委派成功'){
						arr.push(item)
					}
				})
				if(!isWp||!isJg){
					var flag = window.confirm("是否对已分配委派对象的任务，提交给金三进行委派处理？")
					if(flag){
						zdwp.data.rowids = arr
						zdwp.triggerAction(0)
					}else{
						return
					}
				}else{
					zdwp.data.rowids = arr
					zdwp.triggerAction(0)
				}
				// if (!isWp) {
				// 	alert("请选择已经设置委派对象的记录!");
				// 	return;
				// }
				// if (!isJg) {

			},
			//递归，通过zdwp.data.flag判断是否拿到委派结果
			triggerAction: function (iteration) {
				shzs.console("trig-001;iteration="+iteration);
				if (iteration >= zdwp.data.rowids.length) {
					return;
				}
				shzs.console("trig-002;iteration="+iteration);
				// 清除之前可能存在的定时器  
				if (zdwp.data.timerA !== null) {
					clearTimeout(zdwp.data.timerA);
				}
        shzs.console("trig-003;iteration="+iteration);
				// 设置一个新的定时器  
				zdwp.data.timerA = setTimeout(function () {
					// 10秒后，如果没有再次触发事件A，则执行事件B
					if (iteration < zdwp.data.rowids.length) {
						zdwp.handleTimeout();
					} else {
						clearTimeout(zdwp.data.timerA);
					}
				}, 10000);

				//每100毫秒判断下有没有拿到请求结果
				var timer = setInterval(() => {
					shzs.console("trig-004;iteration="+iteration);
					shzs.console("trig-004;zdwp.data.flag="+zdwp.data.flag);
					if (zdwp.data.flag) {
						clearInterval(timer);
						zdwp.data.flag = false
						var row = $("#zdwp_table").jqGrid("getRowData", zdwp.data.rowids[iteration])
						var userId = row.userId
						var swrysfDm = row.swrysfDm
						var swjgDm = row.swjgDm
						var gwDm = row.gwDm
						var workItemId = row.gzxid
						var lcslid = row.lcslid
						var sourceUser = row.sourceUser
						gt3_dbrwwp(userId, swrysfDm, swjgDm, gwDm, workItemId, lcslid, sourceUser)
						zdwp.triggerAction(iteration + 1);
					}
					zdwp.queryResStr();
				}, 100)
			},
			//通过callshell调用，并拿到请求结果和gzxid
			queryResStr:function(){
                     var  resStr = zdwpGetVarValue("zdwpActionResult");
                     var  gzxid  = zdwpGetVarValue("zdwpActionWorkItemId");
				if(resStr !==""){
						var res = JSON.parse(resStr)
						var wpjg = ''
						if (res.data.length) {
							wpjg = '委派成功'
						} else {
							wpjg = '委派失败'
						}
						$('#zdwp_table').setCell(gzxid, 'wpjg', wpjg);
						var params = {
							mxs: [{
								id: gzxid,
								wpjg: wpjg
							}]
						}
						jsonPost("/shzs/dbwt/writeback", params, function (res) {
							if (res.code == '0') {
								shzsConsole('回写成功')
							} else {
								shzsConsole('回写失败')
							}
						})
						zdwp.data.flag = true;
				}
			},
			getResStr: function (resStr, gzxid) {
				// 清除之前可能存在的定时器  
				clearTimeout(zdwp.data.timerA);
				zdwp.data.flag = true
				var res = JSON.parse(resStr)
				var wpjg = ''
				if (res.data.length) {
					wpjg = '委派成功'
				} else {
					wpjg = '委派失败'
				}
				$('#zdwp_table').setCell(gzxid, 'wpjg', wpjg);
				var params = {
					mxs: [{
						id: gzxid,
						wpjg: wpjg
					}]
				}
				jsonPost("/shzs/dbwt/writeback", params, function (res) {
					if (res.code == '0') {
						shzsConsole('回写成功')
					} else {
						shzsConsole('回写失败')
					}
				})
			},

			handleCheckboxChange: function (event) {
				var $checkbox = $(event.target);

					sbywmc: $checkbox.attr('data-sbywmc'),
					cnt: parseInt($checkbox.attr('data-cnt'), 10)
				};

				if ($checkbox.is(':checked')) {
					zdwp.data.selectedOptions.push(item.lcswsxdm);

					zdwp.data.selectedOptions = zdwp.data.selectedOptions.filter(function (selectedItem) {
